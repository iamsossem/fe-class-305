<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미니 계산기</title>
    <style>
      *{ margin: 0; padding: 0; box-sizing: border-box;}
      body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f0f0;
      }
      .container{
        border-radius: 0.5rem;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        padding: 1rem;
        width: 340px;
      }
      .container > input{
        display: block;
        width: 100%;
        padding: 1rem;
        font-size: 1.5rem;
        border: 1px solid #ccc; 
        border-radius: 4px;
        background-color: #f9f9f9;
        text-align: right;
      }
      .container > .btn-wrap{
        margin-top: 0.5rem;
        display: grid;
        grid-template-columns: repeat(4,1fr);
        gap: 0.5rem;
        button{
          background-color: #f9f9f9;
          font-size: 1.5rem;
          height: 60px;
          border: 1px solid #ddd;   
          border-radius: 4px;    
          cursor: pointer;
          &:hover{
            filter: brightness(0.9);
          }
          &:active{
            filter: brightness(0.8);
          }
        }
        button.btn-zero{
          grid-column: 1/3;
        }
        button.btn-reset{
          background-color: #e81123;
          color: #fff;
        }
        button.btn-equal{
          background-color: #005a9e;
          color: #fff;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" class="display" disabled>
      <div class="btn-wrap">
        <button>(</button>
        <button>)</button>
        <button>←</button>
        <button>÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>×</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>－</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>＋</button>
        <button class="btn-zero">0</button>
        <button class="btn-reset">C</button>
        <button class="btn-equal">=</button>
      </div>
    </div>
    <script src="./calc2.js"></script>
  </body>
</html>
