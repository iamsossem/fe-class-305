<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로그래스바</title>
  <link rel="stylesheet" href="./progress.css">
</head>
<body>
  <div class="container">
    <h1>SOFTWARE SKILLS</h1>
    <div class="item">
      <div class="item-txt">
        <p>HTML5</p>
        <p>90%</p>
      </div>
      <div class="item-line">
        <div class="item-bar" style="width: 90%;"></div>
      </div>
    </div>
    <div class="item">
      <div class="item-txt">
        <p>CSS3</p>
        <p>80%</p>
      </div>
      <div class="item-line">
        <div class="item-bar" style="width: 80%; animation-delay: 0.5s;"></div>
      </div>
    </div>
    <div class="item">
      <div class="item-txt">
        <p>jQuery</p>
        <p>65%</p>
      </div>
      <div class="item-line">
        <div class="item-bar" style="width: 65%;animation-delay: 1s;"></div>
      </div>
    </div>
    <div class="item">
      <div class="item-txt">
        <p>Photoshop</p>
        <p>70%</p>
      </div>
      <div class="item-line">
        <div class="item-bar" style="width: 70%;animation-delay: 1.5s;"></div>
      </div>
    </div>
    <div class="item">
      <div class="item-txt">
        <p>Illustrator</p>
        <p>82%</p>
      </div>
      <div class="item-line">
        <div class="item-bar" style="width: 82%;animation-delay: 2s;"></div>
      </div>
    </div>
  </div>
</body>
</html>
