<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드뒤집기</title>
  <style>
    *{ margin: 0; padding: 0;}
    .container{
      height: 100vh;
      background-color: #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 900px;
    }
    .card{
      transform: rotateY(0deg);
      width: 200px;
      height: 300px;
      border-radius: 0.5rem;
      background-color: #fff;
      transform-style: preserve-3d;
      transform-origin: right;
      position: relative;
      transition: 1s;
      &:hover{
        transform: rotateY(180deg);
      }
      > div{
        width: 100%;
        height: 100%;
        border-radius: 0.5rem;
        font-size: 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        /* 뒷면이 화면에 보이지 않게 뒷면 숨기기 */
        backface-visibility: hidden;
      }
    }
    .card-front{
      background-color: yellowgreen;
      z-index: 1;
    }
    .card-back{
      background-color: tomato;
      transform: rotateY(180deg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-front">앞면</div>
      <div class="card-back">뒷면</div>
    </div>
  </div>
</body>
</html>
