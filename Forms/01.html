<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form 태그</title>
    <link rel="stylesheet" href="./01.css" />
  </head>
  <body>
    <form method="get">
      <!-- 1. label 안에 input추가 -->
      <label>
        <span>아이디</span>
        <input type="text" name="input-id" placeholder="아이디를 입력하세요" />
      </label>
      <br />

      <!-- 2. for-id를 연결 -->
      <label for="input-pw">비밀번호</label>
      <input type="password" id="input-pw" name="input-pw" />
      <br />

      <!-- label태그안에 input 추가 -->
      <label>
        <input type="checkbox" name="input-check" value="all" />
        <span>전체동의하기</span>
      </label>
      <input
        type="checkbox"
        name="input-check"
        id="input-select"
        value="select"
      />
      <label for="input-select">일부동의하기</label>
      <br />
      <label>
        <input type="radio" name="visitor" value="local" />
        <span>내국인</span>
      </label>

      <input
        type="radio"
        id="input-foreigner"
        name="visitor"
        value="foreigner"
      />
      <label for="input-foreigner">외국인</label>

      <br />
      <input type="color" />
      <!-- 전달/전송 -->
      <br />
      <!-- <input type="submit" value="보내기"/> -->
      <button type="submit">보내기</button>
      <!-- <input type="reset"> -->
      <button type="reset">초기화</button>
    </form>
  </body>
</html>
