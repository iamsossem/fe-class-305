<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS기초문법</title>
  <link rel="stylesheet" href="./01style.css">
  <style>
    /* 선택자{속성:속성값;} */
    /* 태그선택자 : 태그 이름으로 작성 */
    p{
      color: tomato;
      text-align: center;
    }
  </style>
</head>
<body>
  <p style="color:aqua;text-align:right">단락 스타일 예제</p>
  <p>p태그 추가</p>
  <span>인라인 스타일 예제</span>
</body>
</html>
