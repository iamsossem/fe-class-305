<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그리드 레이아웃</title>
  <style>
    *{ margin: 0; padding: 0;}
    body{
      height: 100vh;
    }
    .even{
      background-color: tomato;
    }
    .stroke{
      border: 1px solid #111;
    }
    .container{
      height: 100%;
      display: grid;
      /* grid-template-columns: 1fr 1fr 1fr; */
      grid-template-columns: repeat(3,1fr);
      grid-template-rows: repeat(3,1fr);
    }
    .one{
      grid-column: 1/3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="one">1</div>
    <div class="even">2</div>
    <div class="stroke">3</div>
    <div class="even">4</div>
    <div>5</div>
    <div class="even stroke">6</div>
    <div>7</div>
    <div>8</div>
  </div>
</body>
</html>
