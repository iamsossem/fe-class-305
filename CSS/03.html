<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 박스모델</title>
  <style>
    *{ margin: 0; padding: 0;}
    body{
      font-size: 0;
    }
    div{
      display: inline;
      font-size: 16px;
      background-color: orange;
      padding: 24px 30px 45px 50px;
      border: 1px solid #000;
      /* border-color: #000;
      border-style: solid;
      border-width: 1px; */
      /* padding-top: 24px;
      padding-right: 30px;
      padding-bottom: 45px;
      padding-left: 50px; */
    }
    span{
      display: block;
      font-size: 16px;
      background-color: tomato;
      padding: 24px 30px 45px 50px;
      border: 1px solid #000;
    }
  </style>
</head>
<body>
  <!--  피그마-frame -->
  <div>블록태그</div>
  <div>블록태그</div>
  <span>인라인태그</span>
  <span>인라인태그</span>
</body>
</html>
