<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>테슬라 클론</title>
  </head>
  <body class="nanum-gothic-regular">
    <header>
      <nav>
        <p class="logo nanum-gothic-bold">TESLA</p>
        <p class="menu-icon nanum-gothic-bold">메뉴</p>
      </nav>
      <h2 class="nanum-gothic-extrabold">Model 3</h2>
      <div class="btn-wrap">
        <button class="btn-blue">주문하기</button>
        <button class="btn-white">시승신청</button>
      </div>
    </header>
    <main>
      <section id="sec01">
        <div class="sec01-cardlist">
          <div class="sec01-card item01">
            <h3>미드사이즈 SUV</h3>
            <div class="bottom-text">
              <h2 class="nanum-gothic-extrabold">Model Y</h2>
              <div class="btn-wrap">
                <button class="btn-blue">주문하기</button>
                <button class="btn-white">자세히 알아보기</button>
              </div>
            </div>
          </div>
          <div class="sec01-card item02">
            <h3>유틸리티 트럭</h3>
            <div class="bottom-text">
              <h2 class="nanum-gothic-extrabold">CYBERTRUCK</h2>
              <div class="btn-wrap">
                <button class="btn-blue">주문하기</button>
                <button class="btn-white">자세히 알아보기</button>
              </div>
            </div>
          </div>
        </div>
        <div class="indicator">
          <div class="active"></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </section>
      <section id="sec02">
        <div class="sec02-card item01">
          <div class="sec02-img"></div>
          <div class="sec02-txt">
            <h2 class="nanum-gothic-extrabold">Tesla 경험하기</h2>
            <p>지금 시승 신청하세요</p>
            <div class="btn-wrap">
              <button class="btn-white">시승 신청하기</button>
            </div>
          </div>
        </div>
        <div class="sec02-card item02">
          <div class="sec02-img"></div>
          <div class="sec02-txt">
            <h2 class="nanum-gothic-extrabold">액세서리</h2>
            <p>차량 액세서리 및 Tesla 브랜드 상품을 만나보세요.</p>
            <div class="btn-wrap">
              <button class="btn-white">지금 쇼핑하기</button>
            </div>
          </div>
        </div>
      </section>
      <section></section>
      <section></section>
      <section></section>
    </main>
    <footer></footer>
  </body>
</html>
